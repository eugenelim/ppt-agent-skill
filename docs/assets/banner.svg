<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="-20%" r="100%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="50%" stop-color="#050b1f"/>
      <stop offset="100%" stop-color="#050b1f"/>
    </radialGradient>
    <radialGradient id="glow1" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="url(#bg-grad)"/>
  <rect width="1280" height="360" fill="url(#glow1)"/>
  <rect width="1280" height="360" fill="url(#glow2)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>

  <g font-family="-apple-system, 'Inter Tight', sans-serif" fill="#ffffff">
    <g transform="translate(80, 80)">
      <circle cx="6" cy="14" r="6" fill="#22D3EE"/>
      <text x="22" y="20" font-size="13" font-weight="700" letter-spacing="2.5" fill="#22D3EE">PPT AGENT SKILL · WORLD-CLASS</text>
    </g>

    <text x="80" y="180" font-size="72" font-weight="700" letter-spacing="-3" fill="url(#title)">Build presentations,</text>
    <text x="80" y="252" font-size="72" font-weight="400" font-style="italic" letter-spacing="-2" font-family="Georgia, 'Source Serif Pro', serif" fill="url(#accent-grad)">at world-class quality.</text>

    <g transform="translate(80, 300)" font-size="13" letter-spacing="1.5" opacity="0.6" font-family="'JetBrains Mono', monospace">
      <text x="0" y="0">26 STYLES</text>
      <text x="120" y="0" fill="rgba(255,255,255,0.3)">·</text>
      <text x="140" y="0">18 CHARTS</text>
      <text x="260" y="0" fill="rgba(255,255,255,0.3)">·</text>
      <text x="280" y="0">5 CATEGORIES</text>
      <text x="430" y="0" fill="rgba(255,255,255,0.3)">·</text>
      <text x="450" y="0">PPTX EDITABLE</text>
    </g>
  </g>

  <g opacity="0.4" stroke="#22D3EE" fill="none">
    <path d="M 30 30 L 30 70 M 30 30 L 70 30" stroke-width="1"/>
    <path d="M 1250 290 L 1250 330 M 1250 330 L 1210 330" stroke-width="1"/>
  </g>

  <line x1="0" y1="359" x2="1280" y2="359" stroke="url(#accent-grad)" stroke-width="1" opacity="0.5"/>
</svg>
