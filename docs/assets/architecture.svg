<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" font-family="-apple-system, 'Inter Tight', 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif">
