#   3. ELK round trip third (foundation for single-pipeline, arch, flowchart)
#   4-11. type-specific work, in dependency and category order
#
# Dependency key (work:<path> notation):
#   elk-finalized-layout-roundtrip blocks: single-pipeline, architecture, flowchart
#   mermaid-single-finalized-layout-pipeline blocks: er layout, requirement layout

