name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  planning-schema-compliance:
    name: planning schema compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install pytest
      - run: python3 -m pytest tests/test_planning_schema_compliance.py -q
