name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  planning-schema-compliance:
    name: planning schema compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install pytest
      - run: python3 -m pytest tests/test_planning_schema_compliance.py -q

  mermaid-oracle:
    name: mermaid renderer oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -r requirements-dev.txt
      # Differential mode (vs real mermaid.js via mermaidx) + block-safe
      # self-consistency. mermaidx is declared in requirements-dev.txt so the
      # differential mode actually runs here instead of skipping.
      - run: python3 -m pytest tests/test_oracle.py -q
