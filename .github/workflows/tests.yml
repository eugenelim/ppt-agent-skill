name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  planning-schema-compliance:
    name: planning schema compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install pytest
      - run: python3 -m pytest tests/test_planning_schema_compliance.py -q

  mermaid-oracle:
    name: mermaid renderer oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -r requirements-dev.txt
      # Self-consistency oracle (no external tools required): every edge endpoint
      # our emitter draws must resolve to a declared node. Runs for all fixture types.
      # Differential mode (vs real mermaid.js via mmdc) requires the mmdc npm CLI
      # binary (@mermaid-js/mermaid-cli); it is marked @pytest.mark.external_reference
      # and skips cleanly when the binary is absent.
      - run: python3 -m pytest tests/test_oracle.py -q

  mermaid-render-guards:
    name: mermaid render guards (no playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install pytest Pillow lxml
      # Guards run without playwright installed so the playwright-cleanliness
      # test is meaningful. Includes sibling-import AST scan, adaptive-theme
      # unit tests, vendor bundle parity, the full mermaid_layout shim
      # regression suite (playwright-free), icon catalog drift lint, and
      # top-level CLI smoke tests (playwright-free subcommands).
      # test_svg2pptx_shapes needs python-pptx (requirements.txt) so it runs
      # in render-scripts, not here. lxml is installed here for test_svg_stdout
      # (native SVG backend — no Playwright required for supported types like flowchart).
      - run: python3 -m pytest tests/test_mermaid_render_guards.py tests/test_payload_boundary.py tests/test_mermaid_layout.py tests/test_mermaid_render_cli.py -q
      - run: python3 tests/test_icon_search.py

  render-scripts:
    name: render scripts (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: playwright install chromium --with-deps
      # Security helpers, fail-fast Chromium error wrapping, and behavioral
      # degradation tests (test_browser.py); Playwright-contract assertions and
      # the out-of-root image confinement test (test_html2svg_tmp_isolation.py);
      # source-level contract checks for html2png and build_pdf; CLI png subprocess
      # smoke test (test_mermaid_render_cli_playwright.py — svg test is in the
      # browser-free job above); resource-contract tests including BrowserSession
      # lifecycle and flock (test_resource_contracts.py).
      # Snapshot pixel-comparison tests are skipped — baselines are captured on
      # macOS and cross-platform pixel-exact comparison is unreliable in CI.
      - run: python3 -m pytest tests/test_browser.py tests/test_html2svg_tmp_isolation.py tests/test_html2png_cwd.py tests/test_build_pdf.py tests/test_svg2pptx_shapes.py tests/test_mermaid_render_cli_playwright.py tests/test_resource_contracts.py -q

  fidelity-unit:
    name: fidelity harness unit tests (no browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install pytest
      # Core library boundary, data model, manifest, comparators, mutations,
      # serialization round-trip, and hardening suite (no browser or mmdc required;
      # adapter-import tests are excluded via -k filter since they need mermaid_render).
      - run: python3 -m pytest tests/fidelity/test_models.py tests/fidelity/test_manifest.py tests/fidelity/test_core_boundary.py tests/fidelity/test_comparators.py tests/fidelity/test_mutations.py tests/fidelity/test_serialization_roundtrip.py tests/fidelity/test_hardening.py -q -k "not FalseGreen"

  fidelity-annotations:
    name: fidelity renderer data annotations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install pytest
      # Verifies that to_html() emits data-kind, data-label, data-shape,
      # data-order, data-parent-id, data-group-id, data-relation-id, data-arrow.
      - run: python3 -m pytest tests/test_fidelity_annotations.py -q

  fidelity-phase1:
    name: fidelity phase 1 end-to-end (no browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install pytest
      # End-to-end harness tests: serialization stability, canonical form,
      # manifest integration. Reference adapter tests are skipped (no mmdc).
      # Hardening suite included (needs mermaid_render, installed via requirements.txt).
      - run: python3 -m pytest tests/fidelity/test_phase1.py tests/fidelity/test_hardening.py -q -k "not TestReferenceAdapter"
      # Validate oracle manifest integrity (no mmdc required — reads committed oracle JSON).
      - run: python3 tests/fidelity/run.py validate
      # Run all 24 cases against committed oracle.
      # Hard failures: PARSE_MISMATCH, SEMANTIC_MISMATCH, QUALITY_FAILURE,
      # EXTRACTOR_GAP, STALE_ORACLE, INTERNAL_ERROR, REFERENCE_RENDER_FAILURE.
      # Active NATIVE_UNSUPPORTED is also a hard failure (active cases must render).
      # Planned NATIVE_UNSUPPORTED is expected and acceptable.
      - run: python3 tests/fidelity/run.py run --report-dir tests/fidelity/reports/ci
      # Determinism check: active-only cases (flowchart + architecture) over 3 runs.
      # sequence/er are planned; their trivially-stable NATIVE_UNSUPPORTED is excluded.
      - run: python3 tests/fidelity/run.py determinism --runs 3 --report-dir tests/fidelity/reports/determinism
      - name: Upload fidelity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fidelity-reports
          path: tests/fidelity/reports/

  deliverable-gate:
    name: deliverable gate enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install pytest python-pptx lxml
      # Gate tests: planning_validator + proof gate block export scripts
      # from producing deliverables unless Step 4 and Step 4.5 are satisfied.
      - run: python3 -m pytest tests/test_deliverable_gate.py -q


  vendor-bundle-checksum:
    name: vendor bundle checksum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python tools/check_bundle_hash.py
      - run: pip install pytest
      - run: python3 -m pytest tests/test_bundle_hash.py -v

  parity-fast:
    name: mermaid parity fast (browser-free, < 60 s)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -r requirements-dev.txt
      # Browser-free parity checks: CI failure conditions, import boundaries,
      # geometry invariants (overlap, containment, boundary-endpoint), determinism.
      # Must complete in under 60 seconds. No Playwright required.
      - run: python3 -m pytest tests/ -m parity_fast --timeout=60 -q

  parity-browser:
    name: mermaid parity browser suite (pinned, sequential)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: pip install pytest
      - run: playwright install chromium --with-deps
      # Pinned browser integration suite. Must NOT run in parallel xdist mode
      # (-p no:xdist ensures sequential execution, protecting snapshot consistency).
      # Raster similarity output is diagnostic only; not a hard gate.
      - run: python3 -m pytest --run-browser tests/ -m browser -p no:xdist -q
