<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>kindergarten_pop · 儿童教育 · World-Class Mock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap');

  :root {
    --bg-from: #fff8e7;
    --bg-to: #ffeed4;
    --cream: #fffaf0;
    --pink: #ffb6c1;
    --pink-soft: #ffe0e6;
    --blue: #87ceeb;
    --blue-soft: #d6efff;
    --green: #06d6a0;
    --green-soft: #d6f8ec;
    --yellow: #ffd166;
    --yellow-soft: #fff1c9;
    --ink: #2a2a3a;
    --ink-soft: #6a6a7a;
    --display-font: 'Quicksand', 'Nunito', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    --body-font: 'Nunito', 'Quicksand', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 720px; overflow: hidden; }
  body {
    background: linear-gradient(160deg, var(--bg-from) 0%, var(--bg-to) 100%);
    color: var(--ink);
    font-family: var(--body-font);
    font-feature-settings: 'kern', 'liga', 'calt', 'ss01';
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    z-index: 0;
    opacity: 0.85;
  }
  .blob-pink-tr {
    top: -40px; right: -30px;
    width: 220px; height: 220px;
    background: radial-gradient(circle at 35% 35%, #ffd0d8 0%, var(--pink) 70%);
    opacity: 0.55;
  }
  .blob-blue-bl {
    bottom: -50px; left: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle at 35% 35%, #b8e5f5 0%, var(--blue) 75%);
    opacity: 0.5;
  }
  .blob-green-mid {
    top: 280px; right: 240px;
    width: 70px; height: 70px;
    background: radial-gradient(circle at 35% 35%, #6ce5c0 0%, var(--green) 80%);
    opacity: 0.35;
  }
  .blob-yellow-side {
    top: 180px; right: -28px;
    width: 90px; height: 90px;
    background: radial-gradient(circle at 35% 35%, #ffe6a0 0%, var(--yellow) 80%);
    opacity: 0.6;
  }

  .star {
    position: absolute;
    z-index: 1;
    font-size: 22px;
    line-height: 1;
    transform: rotate(-8deg);
  }
  .star-1 { top: 96px; right: 320px; font-size: 18px; transform: rotate(12deg); opacity: 0.95; }
  .star-2 { bottom: 110px; right: 90px; font-size: 26px; transform: rotate(-14deg); opacity: 0.9; }

  .stage {
    position: relative;
    width: 100%; height: 100%;
    padding: 56px 72px 0 72px;
    display: flex; flex-direction: column;
    z-index: 2;
  }

  .top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 36px;
  }
  .logo {
    font-family: var(--display-font);
    font-size: 18px; font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--ink);
    display: flex; align-items: center; gap: 12px;
  }
  .logo-emoji {
    width: 44px; height: 44px;
    border-radius: 16px;
    background: var(--cream);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 14px rgba(255, 182, 193, 0.35), inset 0 0 0 2px rgba(255,255,255,0.6);
  }
  .done-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: var(--green);
    color: #fff;
    border-radius: 999px;
    font-family: var(--display-font);
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.02em;
    box-shadow: 0 6px 18px rgba(6, 214, 160, 0.32);
  }
  .done-badge .check {
    display: inline-flex;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    color: var(--green);
    align-items: center; justify-content: center;
    font-size: 11px; font-weight: 900;
  }

  .label {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--display-font);
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.18em;
    color: #ff7a92;
    text-transform: uppercase;
  }
  .label-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ff7a92;
    box-shadow: 0 0 0 4px rgba(255, 122, 146, 0.18);
  }

  .headline {
    font-family: var(--display-font);
    font-weight: 700;
    font-size: 56px;
    line-height: 1.08;
    letter-spacing: -0.015em;
    margin-top: 18px;
    color: var(--ink);
  }
  .headline .accent {
    color: #ff7a92;
    font-weight: 700;
  }
  .headline .balloon {
    display: inline-block;
    transform: translateY(-2px);
  }

  .deck {
    font-family: var(--body-font);
    font-size: 17px; line-height: 1.6;
    color: var(--ink-soft);
    max-width: 640px;
    margin-top: 16px;
    font-weight: 500;
    letter-spacing: -0.003em;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
    margin-top: 42px;
    max-width: 880px;
  }
  .card {
    background: var(--cream);
    border-radius: 28px;
    padding: 24px 24px 22px 24px;
    box-shadow: 0 10px 30px rgba(255, 200, 130, 0.18), inset 0 0 0 1.5px rgba(255,255,255,0.9);
    display: flex; flex-direction: column; gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .card-icon {
    width: 56px; height: 56px;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .card-icon.green { background: var(--green-soft); }
  .card-icon.pink { background: var(--pink-soft); }
  .card-icon.blue { background: var(--blue-soft); }

  .card-num {
    font-family: var(--display-font);
    font-size: 36px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
    display: flex; align-items: baseline; gap: 6px;
  }
  .card-num .unit {
    font-family: var(--body-font);
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0;
  }
  .card-label {
    font-family: var(--body-font);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  .card-1 .accent-line { background: var(--green); }
  .card-2 .accent-line { background: var(--pink); }
  .card-3 .accent-line { background: var(--blue); }
  .accent-line {
    position: absolute;
    left: 24px; bottom: 14px;
    width: 28px; height: 4px;
    border-radius: 999px;
  }

  .bottom-pill-row {
    position: absolute;
    bottom: 36px; left: 72px;
    display: flex; align-items: center; gap: 12px;
    z-index: 3;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    border-radius: 999px;
    font-family: var(--display-font);
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.02em;
  }
  .pill-yellow {
    background: var(--yellow);
    color: #6b4a00;
    box-shadow: 0 6px 16px rgba(255, 209, 102, 0.4);
  }
  .pill-yellow .pill-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #6b4a00;
  }
  .pill-pink {
    background: var(--pink-soft);
    color: #b14a5e;
  }
  .pill-pink .pill-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ff7a92;
  }

  .progress-card {
    position: absolute;
    bottom: 36px; right: 72px;
    background: var(--cream);
    border-radius: 24px;
    padding: 14px 20px 14px 14px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 10px 26px rgba(135, 206, 235, 0.28), inset 0 0 0 1.5px rgba(255,255,255,0.9);
    z-index: 3;
  }
  .ring-wrap {
    position: relative;
    width: 56px; height: 56px;
  }
  .ring-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--display-font);
    font-size: 14px; font-weight: 700;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .progress-meta { display: flex; flex-direction: column; gap: 2px; }
  .progress-title {
    font-family: var(--display-font);
    font-size: 14px; font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  .progress-sub {
    font-family: var(--body-font);
    font-size: 11px; font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="blob blob-pink-tr"></div>
  <div class="blob blob-blue-bl"></div>
  <div class="blob blob-green-mid"></div>
  <div class="blob blob-yellow-side"></div>
  <div class="star star-1">⭐</div>
  <div class="star star-2">⭐</div>

  <div class="stage">
    <div class="top">
      <div class="logo">
        <div class="logo-emoji">🎈</div>
        Little Explorer
      </div>
      <div class="done-badge">
        <span class="check">✓</span>
        今日完成
      </div>
    </div>

    <div class="label">
      <span class="label-dot"></span>
      学习日记 · DAY 12
    </div>

    <h1 class="headline">
      一起 <span class="balloon">🎈</span><br>
      探索 <span class="accent">世界</span> 的奥秘
    </h1>

    <p class="deck">今天我们在花园里发现了好多小秘密 — 软软的苔藓、忙碌的小蚂蚁、还有迎着阳光开放的小花朵 ❤️</p>

    <div class="cards">
      <div class="card card-1">
        <div class="card-icon green">🌿</div>
        <div class="card-num">12<span class="unit">种</span></div>
        <div class="card-label">认识的植物</div>
        <div class="accent-line"></div>
      </div>
      <div class="card card-2">
        <div class="card-icon pink">🐛</div>
        <div class="card-num">5<span class="unit">只</span></div>
        <div class="card-label">观察的昆虫</div>
        <div class="accent-line"></div>
      </div>
      <div class="card card-3">
        <div class="card-icon blue">🌸</div>
        <div class="card-num">3<span class="unit">朵</span></div>
        <div class="card-label">采集的花朵</div>
        <div class="accent-line"></div>
      </div>
    </div>
  </div>

  <div class="bottom-pill-row">
    <div class="pill pill-yellow">
      <span class="pill-dot"></span>
      第 12 天 · 自然观察
    </div>
    <div class="pill pill-pink">
      <span class="pill-dot"></span>
      春季启蒙营
    </div>
  </div>

  <div class="progress-card">
    <div class="ring-wrap">
      <svg viewBox="0 0 56 56" style="width:100%;height:100%;">
        <circle cx="28" cy="28" r="22" fill="none" stroke="#fff1c9" stroke-width="6"/>
        <circle cx="28" cy="28" r="22" fill="none" stroke="#ffd166" stroke-width="6"
                stroke-dasharray="103 138" stroke-linecap="round"
                transform="rotate(-90 28 28)"/>
      </svg>
      <div class="ring-text">75%</div>
    </div>
    <div class="progress-meta">
      <div class="progress-title">本周进度</div>
      <div class="progress-sub">Week 03 / 04</div>
    </div>
  </div>
</body>
</html>
