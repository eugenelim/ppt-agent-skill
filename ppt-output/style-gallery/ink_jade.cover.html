<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ink_jade · 新中式国潮 · World-Class Mock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --paper:        #f5f1e8;
    --paper-warm:   #efe8d6;
    --paper-edge:   #e6dec7;
    --ink:          #1a1a1a;
    --ink-soft:     #2a2622;
    --ink-light:    #5a4f44;
    --ink-faint:    rgba(26, 26, 26, 0.42);
    --vermilion:    #c0392b;
    --vermilion-d:  #9c2a1f;
    --gold-light:   #c9b896;
    --gold-faint:   rgba(201, 184, 150, 0.55);

    --display-font: 'Source Han Serif SC', 'Noto Serif SC', 'STKaiti', 'STSong', SimSun, serif;
    --body-font:    'Source Han Serif SC', 'Noto Serif SC', 'STSong', SimSun, serif;
    --label-font:   'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 720px; overflow: hidden; }
  body {
    background:
      radial-gradient(ellipse 70% 55% at 52% 48%, #ece4cf 0%, var(--paper) 55%, var(--paper-edge) 100%);
    color: var(--ink);
    font-family: var(--body-font);
    font-feature-settings: "kern", "liga", "ss01", "calt", "ccmp";
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    position: relative;
  }

  .ink-bleed-1 {
    position: absolute;
    top: 38%; left: 30%;
    width: 520px; height: 380px;
    background: radial-gradient(ellipse 50% 50% at 50% 50%,
      rgba(90, 79, 68, 0.10) 0%,
      rgba(90, 79, 68, 0.05) 35%,
      transparent 75%);
    pointer-events: none;
    z-index: 1;
  }
  .ink-bleed-2 {
    position: absolute;
    top: 12%; right: 8%;
    width: 360px; height: 260px;
    background: radial-gradient(ellipse 50% 50% at 50% 50%,
      rgba(26, 26, 26, 0.06) 0%,
      transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  .grain {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, rgba(26, 26, 26, 0.025) 1px, transparent 1px);
    background-size: 5px 5px;
    pointer-events: none;
    z-index: 1;
  }

  .fiber-h {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(90, 79, 68, 0.18), transparent);
    pointer-events: none;
    z-index: 1;
  }
  .fiber-1 { top: 24%; }
  .fiber-2 { top: 67%; }

  .frame-line-top {
    position: absolute;
    top: 36px; left: 80px; right: 80px;
    height: 1px;
    background: linear-gradient(90deg, var(--ink) 0%, var(--ink) 60px, transparent 60px, transparent calc(100% - 60px), var(--ink) calc(100% - 60px), var(--ink) 100%);
    opacity: 0.8;
    z-index: 3;
  }
  .frame-line-bot {
    position: absolute;
    bottom: 36px; left: 80px; right: 80px;
    height: 1px;
    background: linear-gradient(90deg, var(--ink) 0%, var(--ink) 60px, transparent 60px, transparent calc(100% - 60px), var(--ink) calc(100% - 60px), var(--ink) 100%);
    opacity: 0.8;
    z-index: 3;
  }

  .stage {
    position: relative;
    width: 100%; height: 100%;
    z-index: 2;
  }

  .vertical-title {
    position: absolute;
    top: 88px; left: 110px;
    writing-mode: vertical-rl;
    font-family: var(--display-font);
    font-size: 84px;
    font-weight: 500;
    letter-spacing: 0.32em;
    line-height: 1.05;
    color: var(--ink);
    text-indent: 0.32em;
    z-index: 4;
  }
  .vertical-title .ch {
    display: block;
  }
  .vertical-title .ch-accent {
    color: var(--vermilion);
  }

  .vertical-sub {
    position: absolute;
    top: 100px; left: 232px;
    writing-mode: vertical-rl;
    font-family: var(--display-font);
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.45em;
    text-indent: 0.45em;
    color: var(--ink-light);
    z-index: 4;
  }

  .vertical-divider {
    position: absolute;
    top: 110px; left: 280px;
    width: 1px; height: 280px;
    background: linear-gradient(to bottom, var(--ink) 0%, var(--ink-light) 60%, transparent 100%);
    opacity: 0.55;
    z-index: 3;
  }

  .seal {
    position: absolute;
    top: 70px; right: 96px;
    width: 64px; height: 64px;
    background: var(--vermilion);
    color: #fff8e7;
    font-family: var(--display-font);
    font-size: 28px;
    font-weight: 700;
    line-height: 64px;
    text-align: center;
    border-radius: 4px;
    box-shadow:
      inset 0 0 0 2px rgba(255, 248, 231, 0.18),
      0 6px 14px rgba(192, 57, 43, 0.22);
    letter-spacing: 0;
    z-index: 5;
  }
  .seal-mini {
    position: absolute;
    top: 148px; right: 116px;
    width: 24px; height: 24px;
    background: var(--vermilion-d);
    color: #fff8e7;
    font-family: var(--display-font);
    font-size: 12px;
    font-weight: 600;
    line-height: 24px;
    text-align: center;
    border-radius: 2px;
    z-index: 5;
  }

  .label-en {
    position: absolute;
    top: 196px; right: 96px;
    font-family: var(--label-font);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-indent: 0.4em;
    color: var(--gold-light);
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
    z-index: 4;
    text-align: right;
  }

  .label-anchor {
    position: absolute;
    top: 220px; right: 96px;
    width: 44px; height: 1px;
    background: var(--gold-light);
    opacity: 0.7;
    z-index: 4;
  }

  .body-poem {
    position: absolute;
    bottom: 130px; left: 110px;
    font-family: var(--display-font);
    font-size: 22px;
    font-weight: 400;
    line-height: 2.1;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    z-index: 4;
  }
  .body-poem .em {
    color: var(--vermilion);
    font-weight: 500;
  }

  .body-attr {
    position: absolute;
    bottom: 100px; left: 112px;
    font-family: var(--label-font);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-indent: 0.35em;
    color: var(--ink-faint);
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
    z-index: 4;
  }

  .brush-stroke {
    position: absolute;
    bottom: 130px; right: 100px;
    width: 168px; height: 6px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(192, 57, 43, 0.25) 6%,
      var(--vermilion) 22%,
      var(--vermilion-d) 55%,
      var(--vermilion) 78%,
      transparent 100%);
    transform: rotate(-15deg);
    border-radius: 3px;
    z-index: 3;
    box-shadow:
      0 1px 0 rgba(192, 57, 43, 0.18),
      0 -1px 0 rgba(192, 57, 43, 0.12);
  }
  .brush-tail {
    position: absolute;
    bottom: 124px; right: 78px;
    width: 36px; height: 4px;
    background: linear-gradient(90deg, var(--vermilion) 0%, rgba(192, 57, 43, 0.4) 50%, transparent 100%);
    transform: rotate(-18deg);
    border-radius: 2px;
    opacity: 0.85;
    z-index: 3;
  }
  .brush-splash {
    position: absolute;
    bottom: 118px; right: 56px;
    width: 14px; height: 8px;
    background: radial-gradient(ellipse 50% 50% at 50% 50%, var(--vermilion) 0%, rgba(192, 57, 43, 0.4) 60%, transparent 100%);
    transform: rotate(-12deg);
    border-radius: 50%;
    opacity: 0.75;
    z-index: 3;
  }
  .brush-dot {
    position: absolute;
    bottom: 156px; right: 244px;
    width: 6px; height: 6px;
    background: var(--vermilion);
    border-radius: 50%;
    opacity: 0.55;
    z-index: 3;
  }

  .vert-meta {
    position: absolute;
    bottom: 132px; right: 64px;
    writing-mode: vertical-rl;
    font-family: var(--label-font);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.4em;
    color: var(--ink-light);
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
    z-index: 4;
    opacity: 0.7;
  }

  .footer {
    position: absolute;
    bottom: 56px;
    left: 110px; right: 110px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--label-font);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-indent: 0.28em;
    color: var(--ink-faint);
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
    z-index: 4;
  }
  .footer .meta-cn {
    font-family: var(--display-font);
    letter-spacing: 0.4em;
    text-indent: 0.4em;
    color: var(--ink-light);
    text-transform: none;
  }
  .footer .pg {
    font-family: var(--label-font);
    letter-spacing: 0.18em;
  }

  .cm-h { position: absolute; top: 36px; left: 56px; width: 14px; height: 1px; background: var(--ink); opacity: 0.7; z-index: 4; }
  .cm-v { position: absolute; top: 28px; left: 64px; width: 1px; height: 14px; background: var(--ink); opacity: 0.7; z-index: 4; }
  .cm-h2 { position: absolute; bottom: 36px; right: 56px; width: 14px; height: 1px; background: var(--ink); opacity: 0.7; z-index: 4; }
  .cm-v2 { position: absolute; bottom: 28px; right: 64px; width: 1px; height: 14px; background: var(--ink); opacity: 0.7; z-index: 4; }
</style>
</head>
<body>
  <div class="ink-bleed-1"></div>
  <div class="ink-bleed-2"></div>
  <div class="grain"></div>
  <div class="fiber-h fiber-1"></div>
  <div class="fiber-h fiber-2"></div>

  <div class="frame-line-top"></div>
  <div class="frame-line-bot"></div>

  <div class="cm-h"></div>
  <div class="cm-v"></div>
  <div class="cm-h2"></div>
  <div class="cm-v2"></div>

  <div class="stage">
    <div class="vertical-title">
      <span class="ch">茶</span>
      <span class="ch">之</span>
      <span class="ch ch-accent">道</span>
    </div>

    <div class="vertical-divider"></div>

    <div class="vertical-sub">器　承　古　意　心　归　今</div>

    <div class="seal">茶</div>
    <div class="seal-mini">壹</div>
    <div class="label-en">CHA　·　DAO　·　MMXXVI</div>
    <div class="label-anchor"></div>

    <div class="body-poem">
      一　盏　清　茗，<br>
      半　窗　<span class="em">山　色，</span><br>
      器　与　心　同　温。
    </div>
    <div class="body-attr">— FROM　THE　EASTERN　TEAHOUSE　PROJECT</div>

    <div class="brush-dot"></div>
    <div class="brush-stroke"></div>
    <div class="brush-tail"></div>
    <div class="brush-splash"></div>

    <div class="vert-meta">EST　MMXXVI　·　VOL　I</div>
  </div>

  <div class="footer">
    <span>CHAPTER I  —  PROLOGUE</span>
    <span class="meta-cn">东方茶寮 · 新中式国潮</span>
    <span class="pg">01 / 24</span>
  </div>
</body>
</html>
